name: Deploy static content to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: 'fastlanef1shop/package-lock.json'
          
      - name: Install dependencies
        working-directory: fastlanef1shop
        run: npm ci
        
      - name: Build
        working-directory: fastlanef1shop
        env:
          BASE_PATH: '/FastLaneF1Shop'
        run: npm run build
      
      - name: Generate Sitemap
        run: node fastlanef1shop/scripts/generate-sitemap.js
      
      - name: Copy sitemap to build
        run: cp fastlanef1shop/sitemap.xml fastlanef1shop/build/sitemap.xml
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './fastlanef1shop/build'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4